<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Связаться с нами</title>
    <link rel="stylesheet" href="styles.css">
    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

    <div class="card">

        <div class="card__map">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2245.019057984058!2d37.588012!3d55.734028!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x46b54a5c8e5f5f5f%3A0x5f5f5f5f5f5f5f5f!2z0JzQtdC90LjQvtC_0L7QstC10YDQvtC5!5e0!3m2!1sru!2sru!4v1731670519217"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
            <div class="card__map-info">
                <div class="card__map-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    Москва, Россия
                </div>
                <div class="card__map-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.5 19.79 19.79 0 0 1 1.61 4.93 2 2 0 0 1 3.6 2.73h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.71 2.81a2 2 0 0 1-.45 2.11L7.91 10.3a16 16 0 0 0 5.79 5.79l.96-.96a2 2 0 0 1 2.11-.45c.91.35 1.85.58 2.81.71A2 2 0 0 1 21.28 17.5z"/></svg>
                    +7 (495) 123-45-67
                </div>
                <div class="card__map-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    hello@yourcompany.ru
                </div>
            </div>
        </div>

        <div class="card__form">
            <h1>Связаться с нами</h1>
            <p class="card__subtitle">Мы будем рады услышать вас. Напишите нам!</p>

            <div class="form__group">
                <label for="name">ФИО</label>
                <input id="name" type="text" placeholder="Иван Иванов">
            </div>
            <div class="form__group">
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="ivan@example.ru">
            </div>
            <div class="form__group">
                <label for="phone">Телефон</label>
                <input id="phone" type="tel" placeholder="+7 (999) 123-45-67">
            </div>
            <div class="form__group">
                <label for="message">Сообщение</label>
                <textarea id="message" placeholder="Напишите ваше сообщение здесь..."></textarea>
            </div>

            <button type="submit" id="submitBtn">
                <span>Отправить сообщение</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>

    </div>

    <div class="toast" id="toast">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Сообщение успешно отправлено!
    </div>

    <script>
        const EMAILJS_PUBLIC_KEY  = 'YOUR_PUBLIC_KEY'; 
        const EMAILJS_SERVICE_ID  = 'YOUR_SERVICE_ID';
        const EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';

        emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

        // Остальной код без изменений...
        const btn     = document.getElementById('submitBtn');
        const btnText = btn.querySelector('span');
        const toast   = document.getElementById('toast');
        const inputs  = document.querySelectorAll('input, textarea');

        function isValidEmail(val) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
        }

        function showToast(msg, success = true) {
            toast.innerHTML = success
                ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> ${msg}`
                : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ${msg}`;
            toast.style.background = success ? '#111827' : '#7f1d1d';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        btn.addEventListener('click', async () => {
            let valid = true;
            inputs.forEach(i => {
                if (!i.value.trim()) { i.classList.add('error'); valid = false; }
            });

            const emailInput = document.getElementById('email');
            if (emailInput.value && !isValidEmail(emailInput.value)) {
                emailInput.classList.add('error');
                valid = false;
            }

            if (!valid) return;

            btn.disabled = true;
            btnText.textContent = 'Отправляем...';

            const templateParams = {
                from_name:  document.getElementById('name').value.trim(),
                from_email: document.getElementById('email').value.trim(),
                phone:      document.getElementById('phone').value.trim(),
                message:    document.getElementById('message').value.trim(),
            };

            try {
                await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
                showToast('Сообщение успешно отправлено!', true);
                inputs.forEach(i => i.value = '');
            } catch (err) {
                console.error('EmailJS error:', err);
                showToast('Не удалось отправить. Попробуйте позже.', false);
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Отправить сообщение';
            }
        });

        inputs.forEach(i => i.addEventListener('input', () => i.classList.remove('error')));
    </script>
</body>
</html>
